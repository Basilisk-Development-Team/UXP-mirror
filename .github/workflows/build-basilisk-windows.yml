name: Build Basilisk Windows

on:
  pull_request:
  workflow_dispatch:
  # push:
  #   branches:
  #     - master
  #     - release

jobs:
  build-basilisk-windows:
    name: Build Basilisk ${{ matrix.config.name }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows-Win64
            win: win64
            arch: x86_64

          - name: Windows-Win32
            win: win32
            arch: i686

    steps:
      - name: List available VC Redist folders (for debugging)
        run: tree /f "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\redist"

      - name: Install MozillaBuild
        run: |
          Invoke-WebRequest -Uri https://ftp.mozilla.org/pub/mozilla/libraries/win32/MozillaBuildSetup-3.4.exe -OutFile MozillaBuildSetup-3.4.exe
          .\MozillaBuildSetup-3.4.exe /S /v/qn | Write-Output
          del .\MozillaBuildSetup-3.4.exe
        shell: pwsh

      - uses: ChristopheLav/windows-sdk-install@v1
        with:
          version-sdk: ${{ matrix.config.arch == 'x86_64' && '26100' || '22621' }}
          features: "OptionId.DesktopCPPx64,OptionId.DesktopCPPx86"

      - name: Checkout eUXP
        uses: actions/checkout@v6
        with:
          path: euxp
          repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          submodules: recursive

      - name: Clone Basilisk and insert eUXP platform
        run: |
          git clone -b basilisk https://repo.palemoon.org/Basilisk-Dev/Basilisk basilisk
          Remove-Item -Recurse -Force .\basilisk\platform
          Move-Item -Path .\euxp -Destination .\basilisk\platform
        shell: pwsh

      - name: Copy mozconfig
        run: Copy-Item .\basilisk\platform\.github\workflows\build-basilisk-windows\mozconfig-${{ matrix.config.win }} -Destination .\basilisk\.mozconfig
        shell: pwsh

      - name: debug dirs
        run: |
          C:\mozilla-build\start-shell.bat echo '/c'
          C:\mozilla-build\start-shell.bat ls /c
          C:\mozilla-build\start-shell.bat echo '/c/a'
          C:\mozilla-build\start-shell.bat ls /c/a
          C:\mozilla-build\start-shell.bat echo '/d'
          C:\mozilla-build\start-shell.bat ls /d
          C:\mozilla-build\start-shell.bat echo '/d/a'
          C:\mozilla-build\start-shell.bat ls /d/a

      - name: mach configure
        run: |
          C:\mozilla-build\start-shell.bat /d/a/${{ github.event.repository.name }}/basilisk/platform/.github/workflows/build-basilisk-windows/mach-passthrough-windows.sh /d/a/${{ github.event.repository.name }}/basilisk configure
        shell: pwsh

      - name: mach build
        run: |
          C:\mozilla-build\start-shell.bat /d/a/${{ github.event.repository.name }}/basilisk/platform/.github/workflows/build-basilisk-windows/mach-passthrough-windows.sh /d/a/${{ github.event.repository.name }}/basilisk build
        shell: pwsh

      - name: mach package
        run: |
          C:\mozilla-build\start-shell.bat /d/a/${{ github.event.repository.name }}/basilisk/platform/.github/workflows/build-basilisk-windows/mach-passthrough-windows.sh /d/a/${{ github.event.repository.name }}/basilisk package
        shell: pwsh

      - name: mach installer if release branch
        shell: pwsh
        run: |
          C:\mozilla-build\start-shell.bat /d/a/${{ github.event.repository.name }}/basilisk/platform/.github/workflows/build-basilisk-windows/mach-passthrough-windows.sh /d/a/${{ github.event.repository.name }}/basilisk installer

      - uses: actions/upload-artifact@v4
        with:
          name: basilisk-windows-${{ matrix.config.win }}
          path: basilisk/obj-${{ matrix.config.arch }}-pc-mingw32/dist/basilisk-*
